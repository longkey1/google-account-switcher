<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Account Switcher Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>Google Account Switcher</h1>
  
  <div id="settings-container">
    <section>
      <h2>Add New Rule</h2>
      <div id="presets">
        <p><strong>Common:</strong>
          <button type="button" class="preset-btn" data-domain="mail.google.com">Gmail</button>
          <button type="button" class="preset-btn" data-domain="drive.google.com">Drive</button>
          <button type="button" class="preset-btn" data-domain="calendar.google.com">Calendar</button>
          <button type="button" class="preset-btn" data-domain="keep.google.com">Keep</button>
          <button type="button" class="preset-btn" data-domain="meet.google.com">Meet</button>
          <button type="button" class="preset-btn" data-domain="chat.google.com">Chat</button>
          <button type="button" class="preset-btn" data-domain="contacts.google.com">Contacts</button>
        </p>
        <p><strong>Content:</strong>
          <button type="button" class="preset-btn" data-domain="photos.google.com">Photos</button>
          <button type="button" class="preset-btn" data-domain="youtube.com">YouTube</button>
          <button type="button" class="preset-btn" data-domain="news.google.com">News</button>
          <button type="button" class="preset-btn" data-domain="maps.google.com">Maps</button>
        </p>
        <p><strong>Work/Dev:</strong>
          <button type="button" class="preset-btn" data-domain="docs.google.com">Docs</button>
          <button type="button" class="preset-btn" data-domain="sheets.google.com">Sheets</button>
          <button type="button" class="preset-btn" data-domain="slides.google.com">Slides</button>
          <button type="button" class="preset-btn" data-domain="console.cloud.google.com">Cloud Console</button>
          <button type="button" class="preset-btn" data-domain="analytics.google.com">Analytics</button>
          <button type="button" class="preset-btn" data-domain="search.google.com">Search Console</button>
        </p>
      </div>
      <form id="rule-form">
        <div class="form-group">
          <label for="domain">Domain:</label>
          <input type="text" id="domain" placeholder="mail.google.com" required>
          <small class="help-text">Enter the domain only (e.g., <code>mail.google.com</code>). Do <strong>not</strong> include <code>https://</code>.</small>
        </div>
        <div class="form-group">
          <label for="account">Account (Email):</label>
          <input type="email" id="account" placeholder="user@gmail.com" required>
          <small class="help-text">Enter the full Google account email (e.g., <code>your.name@gmail.com</code>).</small>
        </div>
        <button type="submit" id="add-rule">Add Rule</button>
      </form>
    </section>

    <section>
      <h2>Current Rules</h2>
      <table id="rules-table">
        <thead>
          <tr>
            <th>Domain</th>
            <th>Account</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rules-list">
          <!-- Rules will be injected here -->
        </tbody>
      </table>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
