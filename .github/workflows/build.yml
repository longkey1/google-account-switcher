name: Build Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r google-account-switcher.zip . -x "*.git*" ".github*" "README.md" ".gemini*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-account-switcher
          path: google-account-switcher.zip
