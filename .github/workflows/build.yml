name: Build Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(grep '"version":' manifest.json | cut -d'"' -f4)" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          zip -r google-account-switcher-${{ steps.get_version.outputs.VERSION }}.zip . -x "*.git*" ".github*" "README.md" ".gemini*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-account-switcher-${{ steps.get_version.outputs.VERSION }}
          path: google-account-switcher-${{ steps.get_version.outputs.VERSION }}.zip
